name: 🔍 Find Good First Issues

on:
  schedule:
    - cron: '0 6 * * *'   # Every day at 6 AM UTC (11 AM PKT)
  workflow_dispatch:       # Manual trigger anytime
    inputs:
      orgs:
        description: 'Comma-separated orgs to search (leave blank for defaults)'
        required: false
        default: ''

jobs:
  find-issues:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run issue finder (save only — no auto-comment)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          EXTRA_ARGS=""
          if [ -n "${{ github.event.inputs.orgs }}" ]; then
            ORGS=$(echo "${{ github.event.inputs.orgs }}" | tr ',' ' ')
            EXTRA_ARGS="--orgs $ORGS"
          fi
          python scripts/find_issues.py \
            --token "$GH_TOKEN" \
            --save found-issues.json \
            --auto-comment \
            $EXTRA_ARGS

      - name: Create daily digest issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_TOKEN }}
          script: |
            const fs = require('fs');

            let issues;
            try {
              issues = JSON.parse(fs.readFileSync('found-issues.json', 'utf8'));
            } catch (e) {
              console.log('No issues file found');
              return;
            }

            if (!issues.length) {
              console.log('No issues to report');
              return;
            }

            const today = new Date().toISOString().slice(0, 10);

            // Create 'digest' label if it doesn't exist yet
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'digest',
                color: '0075ca',
                description: 'Daily good-first-issues digest'
              });
            } catch (e) {
              // Label already exists — that's fine
            }

            let body = `## 🎯 Good First Issues Digest — ${today}\n\n`;
            body += `Found **${issues.length}** unassigned issues with no open PRs.\n\n`;
            body += `> **How to approve:** Reply to this issue with the numbers you want.\n`;
            body += `> Example: \`approve #3 #7\`\n\n`;
            body += `---\n\n`;

            issues.forEach((issue, i) => {
              body += `### ${i + 1}. ${issue.title}\n`;
              body += `- 🔗 **URL:** ${issue.url}\n`;
              body += `- 🏷 **Labels:** ${(issue.labels || []).join(', ')}\n`;
              body += `- 💬 **Comments:** ${issue.comments}\n`;
              body += `- 📅 **Created:** ${(issue.created_at || '').slice(0, 10)}\n`;
              if (issue.body) {
                const snippet = issue.body.slice(0, 200).replace(/\n/g, ' ');
                body += `- 📝 **Description:** ${snippet}…\n`;
              }
              body += `\n`;
            });

            body += `---\n_Generated by [Good First Issues Finder](https://github.com/kiranShamsHere/good-first-issues-finder)_`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `📋 Daily Digest: ${issues.length} Good First Issues (${today})`,
              body: body,
              labels: ['digest']
            });

            console.log(`✅ Created digest issue with ${issues.length} items`);

      - name: Commit found-issues.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add found-issues.json || true
          git diff --staged --quiet || git commit -m "chore: update found-issues.json [$(date -u +%Y-%m-%d)]"
          git push || true